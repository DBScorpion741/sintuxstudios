<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Panzi01 | Sintux Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Contenedor principal que se asegura de ocupar todo el ancho y alto */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Evita que las barras de desplazamiento aparezcan por el desenfoque */
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
        }

        /* Contenedor para el fondo con la imagen y el efecto borroso */
        .background-container {
            position: fixed;
            top: -10px; /* Pequeño margen negativo para ocultar los bordes del desenfoque */
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            background-image: url('image_7.png'); /* Ruta a la imagen de fondo */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* --- EFECTO BORROSO --- */
            filter: blur(10px); /* Ajusta este valor (ej. 5px, 15px) para más o menos borrosidad */
            
            z-index: -1; /* Se asegura de que el fondo esté detrás del contenido */
        }

        /* Capa superpuesta para oscurecer el fondo si es necesario */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4); /* Un fondo negro semi-transparente (40% de opacidad) */
            z-index: -1;
        }

        /* Contenedor del contenido del perfil, centrado en la pantalla */
        .content-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            z-index: 1; /* Asegura que el contenido esté por encima del fondo */
        }

        .perfil-card {
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            /* Fondo sólido para la tarjeta si lo deseas, o déjala transparente */
            background-color: rgba(26, 26, 26, 0.85); /* Un fondo oscuro semi-transparente */
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Sombra para dar profundidad */
        }

        .perfil-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #6c5ce7;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            align-items: center;
        }

        .social-links a {
            color: #ffffff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
        }

        .social-links a:hover { transform: scale(1.15); color: #6c5ce7; }

        /* Estilo para tu imagen de X personalizada y arreglada */
        .custom-x-icon {
            width: 20px; /* Tamaño ajustado para uniformidad */
            height: 20px;
            object-fit: contain;
            filter: brightness(0) invert(1); /* Convierte tu imagen a blanco */
            transition: transform 0.2s, filter 0.2s;
        }

        .x-custom-link:hover .custom-x-icon {
            /* Mismo efecto de color morado al pasar el mouse */
            filter: brightness(0) saturate(100%) invert(43%) sepia(87%) saturate(1487%) hue-rotate(224deg) brightness(97%) contrast(92%);
        }

        /* Estilo para la K de Kick */
        .kick-icon {
            font-family: sans-serif;
            font-weight: 800;
            border: 2px solid white;
            padding: 0 4px;
            border-radius: 4px;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .kick-icon:hover {
            border-color: #6c5ce7;
            color: #6c5ce7;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
        }
        .back-btn:hover { background: #333333; }
    </style>
</head>

    <div class="overlay"></div>
