<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Panzi01 | Sintux Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .perfil-card {
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 400px;
        }

        .perfil-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #6c5ce7;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            align-items: center;
        }

        .social-links a {
            color: #ffffff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
        }

        .social-links a:hover { transform: scale(1.15); color: #6c5ce7; }

        /* Estilo para tu imagen de X personalizada */
        .custom-x-icon {
            width: 22px;
            height: 22px;
            filter: brightness(0) invert(1);
            transition: transform 0.2s, filter 0.2s;
        }

        .x-custom-link:hover .custom-x-icon {
            filter: brightness(0) saturate(100%) invert(43%) sepia(87%) saturate(1487%) hue-rotate(224deg) brightness(97%) contrast(92%);
        }

        /* Estilo para la K de Kick */
        .kick-icon {
            font-family: sans-serif;
            font-weight: 800;
            border: 2px solid white;
            padding: 0 4px;
            border-radius: 4px;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .kick-icon:hover {
            border-color: #6c5ce7;
            color: #6c5ce7;
        }

        .back-btn {
            display: inline-block;
            padding: 10px 25px;
            background: #1a1a1a;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="perfil-card">
        <img src="media1.png" alt="Panzi01" class="perfil-img">
        <h1>Panzi01</h1>
        <p>Estafador principal en Sintux Studios.</p>

        <div class="social-links">
            <a href="#"><i class="fab fa-twitch"></i></a>
            <a href="https://www.youtube.com/@panzi01"><i class="fab fa-youtube"></i></a>
            <a href="https://www.instagram.com/sebhral"><i class="fab fa-instagram"></i></a>
            
            <a href="https://x.com/tu_usuario" class="x-custom-link">
                <img src="image_6d471c.png" alt="X" class="custom-x-icon">
            </a>
            
            <a href="https://www.tiktok.com/@.panzi01"><i class="fab fa-tiktok"></i></a>
            <a href="https://kick.com/panzi01" class="kick-icon">K</a>
        </div>

        <a href="index.html" class="back-btn">← Volver al inicio</a>
    </div>

</body>
</html>
