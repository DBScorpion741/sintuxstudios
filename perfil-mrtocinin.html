<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de mrTocinin | Sintux Studios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Estructura para el fondo borroso */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
        }

        .background-img {
            position: fixed;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            /* REEMPLAZA 'fondo.png' por el nombre exacto de tu imagen de fondo purpura */
            background-image: url('fondo3.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px); /* Desenfoca la imagen de fondo */
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(10, 10, 10, 0.6); /* Capa oscura para contraste */
            z-index: -1;
        }

        /* Contenido principal */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .perfil-card {
            text-align: center;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            background: rgba(20, 20, 20, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .perfil-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid #ff9ff3;
        }

        h1 { margin: 0 0 10px 0; font-size: 2rem; }
        p { color: #b2bec3; margin-bottom: 25px; }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 25px 0;
            align-items: center;
            flex-wrap: wrap;
        }

        .social-links a {
            color: #ffffff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: transform 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-links a:hover { 
            transform: scale(1.2); 
            color: #6c5ce7; 
        }

        /* SVG corregido para X */
        .social-links svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* Estilo para la K de Kick */
        .kick-icon {
            font-family: sans-serif;
            font-weight: 800;
            border: 2px solid white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .kick-icon:hover {
            border-color: #6c5ce7;
            color: #6c5ce7;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 25px;
            background: #111111;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 20px;
            border: 1px solid #333;
            transition: background 0.2s, border-color 0.2s;
        }

        .back-btn:hover { 
            background: #222; 
            border-color: #ff9ff3; 
        }
    </style>
</head>
<body>

    <div class="background-img"></div>
    <div class="overlay"></div>

    <div class="main-content">
        <div class="perfil-card">
            <img src="media3.png" alt="mrtocinin" class="perfil-img">
            <h1>mrTocinin</h1>
            <p>El payaso oficial de Sintux Studios. Unete para reirte con sus directos.</p>

            <div class="social-links">
                <a href="#"><i class="fab fa-twitch" aria-label="Twitch"></i></a>
                <a href="https://www.youtube.com/@panzi01"><i class="fab fa-youtube" aria-label="YouTube"></i></a>
                <a href="https://www.instagram.com/sebhral"><i class="fab fa-instagram" aria-label="Instagram"></i></a>
                
                <a href="https://x.com/tu_usuario" target="_blank" aria-label="X">
                    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
                
                <a href="https://www.tiktok.com/@.panzi01"><i class="fab fa-tiktok" aria-label="TikTok"></i></a>
                <a href="https://kick.com/panzi01" class="kick-icon">K</a>
            </div>

            <a href="index.html" class="back-btn">← Volver al inicio</a>
        </div>
    </div>

</body>
</html>
